<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenz Shop | المتجر الرسمي</title>
    
    <!-- Bibliothèques essentielles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #B59449; --navy: #1B365D; --cream: #FDFBF7; }
        body { font-family: 'Plus Jakarta Sans', 'Amiri', serif; background-color: var(--cream); margin: 0; }
        .font-serif-title { font-family: 'Cinzel', serif; }
        .nav-blur { background: rgba(253, 251, 247, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid #E8E1D5; }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-10px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Le code de l'application -->
    <script type="text/babel">
        // Importations Firebase via modules CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kenz-shop-default';

        const { useState, useEffect, useMemo } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [products, setProducts] = useState([]);
            const [view, setView] = useState('shop'); 
            const [isAuth, setIsAuth] = useState(false);
            const [pass, setPass] = useState("");
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [cart, setCart] = useState(0);
            const [filter, setFilter] = useState('الكل');

            const [form, setForm] = useState({ name: '', price: '', category: 'Home', desc: '', img: 'grande armoire.jpg' });

            useEffect(() => {
                const login = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                login();
                return onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'products');
                return onSnapshot(q, (s) => {
                    setProducts(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            }, [user]);

            const filteredProducts = useMemo(() => {
                if (filter === 'الكل') return products;
                return products.filter(p => p.category === filter);
            }, [products, filter]);

            const handleAdd = async (e) => {
                e.preventDefault();
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), {
                    ...form, price: parseFloat(form.price), createdAt: new Date().toISOString()
                });
                setForm({ name: '', price: '', category: 'Home', desc: '', img: 'grande armoire.jpg' });
                alert("تمت الإضافة !");
            };

            const handleDelete = async (id) => {
                if (confirm("حذف المنتج؟")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id));
            };

            if (view === 'admin' && !isAuth) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#1B365D] p-6 text-center">
                        <div className="bg-white p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl">
                            <h2 className="text-2xl font-bold mb-6 text-[#1B365D]">دخول الإدارة</h2>
                            <input type="password" placeholder="كلمة المرور (1234)" className="w-full p-4 border rounded-xl mb-4 text-center outline-none" 
                                   value={pass} onChange={e => setPass(e.target.value)} />
                            <button onClick={() => pass === "1234" ? setIsAuth(true) : alert("خطأ")} className="w-full bg-[#1B365D] text-white py-4 rounded-xl font-bold">دخول</button>
                            <button onClick={() => setView('shop')} className="mt-4 text-gray-400 underline text-sm">إلغاء</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="fixed top-0 w-full z-50 nav-blur h-20 px-8 flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            <img src="logo_final.svg" alt="Logo" className="h-12 w-auto" />
                            <div className="hidden md:flex flex-col text-left" dir="ltr">
                                <span className="text-lg font-bold font-serif-title text-[#1B365D]">KENZ SHOP</span>
                                <span className="text-[7px] text-[#B59449] font-bold tracking-[0.2em] uppercase">Home • Mode • Cosmétique</span>
                            </div>
                        </div>
                        <div className="hidden lg:flex items-center gap-8 text-[11px] font-bold uppercase tracking-widest text-[#1B365D]">
                            {['الكل', 'Home', 'Mode', 'Cosmétique', 'Accessoires'].map(cat => (
                                <button key={cat} onClick={() => setFilter(cat)} className={`hover:text-[#B59449] transition ${filter === cat ? 'text-[#B59449] border-b-2 border-[#B59449]' : ''}`}>{cat}</button>
                            ))}
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="relative cursor-pointer hover:text-[#B59449] transition">
                                <i data-lucide="shopping-bag" className="w-6 h-6"></i>
                                <span className="absolute -top-2 -left-2 bg-[#B59449] text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">{cart}</span>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow pt-32 pb-20 px-6 max-w-7xl mx-auto w-full text-right">
                        {view === 'admin' ? (
                            <div className="max-w-3xl mx-auto">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-bold text-[#1B365D]">إضافة منتج</h2>
                                    <button onClick={() => {setView('shop'); setIsAuth(false);}} className="text-[#B59449] font-bold underline">العودة للمتجر</button>
                                </div>
                                <form onSubmit={handleAdd} className="bg-white p-8 rounded-3xl border space-y-4 mb-10 shadow-sm">
                                    <input placeholder="اسم المنتج" required className="w-full p-3 border rounded-xl outline-none" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                                    <input type="number" placeholder="الثمن (DH)" required className="w-full p-3 border rounded-xl outline-none" value={form.price} onChange={e => setForm({...form, price: e.target.value})} />
                                    <select className="w-full p-3 border rounded-xl outline-none" value={form.category} onChange={e => setForm({...form, category: e.target.value})}>
                                        <option>Home</option><option>Mode</option><option>Cosmétique</option><option>Accessoires</option>
                                    </select>
                                    <input placeholder="اسم الصورة (ex: grande armoire.jpg)" className="w-full p-3 border rounded-xl outline-none" value={form.img} onChange={e => setForm({...form, img: e.target.value})} />
                                    <textarea placeholder="الوصف" className="w-full p-3 border rounded-xl outline-none" rows="3" value={form.desc} onChange={e => setForm({...form, desc: e.target.value})} />
                                    <button type="submit" className="w-full bg-[#1B365D] text-white py-4 rounded-xl font-bold hover:bg-[#B59449] transition-all">نشر المنتج</button>
                                </form>
                                <div className="space-y-3">
                                    {products.map(p => (
                                        <div key={p.id} className="bg-white p-4 border rounded-2xl flex justify-between items-center">
                                            <div className="flex items-center gap-4">
                                                <img src={p.img} className="w-12 h-12 object-cover rounded-lg bg-gray-50" />
                                                <p className="font-bold text-[#1B365D]">{p.name} - {p.price} DH</p>
                                            </div>
                                            <button onClick={() => handleDelete(p.id)} className="text-red-400 p-2"><i data-lucide="trash-2"></i></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div>
                                <div className="text-center mb-16">
                                    <h1 className="font-serif-title text-5xl mb-4 text-[#1B365D]">KENZ SHOP</h1>
                                    <div className="w-20 h-1 bg-[#B59449] mx-auto rounded-full"></div>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                                    {filteredProducts.map(p => (
                                        <div key={p.id} onClick={() => setSelectedProduct(p)} className="product-card group bg-white rounded-[2rem] overflow-hidden shadow-sm hover:shadow-2xl border border-gray-50 cursor-pointer p-5 text-center">
                                            <div className="aspect-square rounded-2xl overflow-hidden mb-4 relative">
                                                <img src={p.img} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" onerror="this.src='https://via.placeholder.com/400'"/>
                                            </div>
                                            <h3 className="font-bold text-[#1B365D] text-lg mb-2">{p.name}</h3>
                                            <p className="text-[#B59449] font-black text-2xl">{p.price} DH</p>
                                        </div>
                                    ))}
                                </div>
                                {filteredProducts.length === 0 && <p className="text-center text-gray-400 py-20 italic">لا توجد منتجات حالياً.</p>}
                            </div>
                        )}
                    </main>

                    {selectedProduct && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-[#1B365D]/80 backdrop-blur-md" onClick={() => setSelectedProduct(null)}></div>
                            <div className="relative bg-white w-full max-w-4xl rounded-[3rem] overflow-hidden shadow-2xl p-8 flex flex-col md:flex-row-reverse gap-8 max-h-[90vh] text-right">
                                <img src={selectedProduct.img} className="w-full md:w-1/2 aspect-square object-cover rounded-2xl" />
                                <div className="flex flex-col justify-center">
                                    <h2 className="text-3xl font-bold mb-4 text-[#1B365D]">{selectedProduct.name}</h2>
                                    <p className="text-2xl text-[#B59449] font-black mb-6">{selectedProduct.price} DH</p>
                                    <p className="text-gray-500 mb-8 whitespace-pre-line">{selectedProduct.desc}</p>
                                    <button onClick={() => { setCart(c => c+1); setSelectedProduct(null); }} className="bg-[#1B365D] text-white py-4 rounded-xl font-bold shadow-lg">إضافة إلى السلة</button>
                                </div>
                                <button onClick={() => setSelectedProduct(null)} className="absolute top-6 right-6 bg-white w-10 h-10 rounded-full flex items-center justify-center text-[#1B365D] shadow-xl font-bold">X</button>
                            </div>
                        </div>
                    )}

                    <footer className="py-24 text-center border-t border-gray-100 bg-white">
                        <p className="text-gray-300 text-[10px] tracking-[0.4em] mb-10 uppercase">KENZ SHOP OFFICIAL</p>
                        <button onClick={() => setView('admin')} className="bg-[#B59449] text-white px-10 py-4 rounded-full text-xs font-bold shadow-lg shadow-gold/20 hover:scale-105 transition-all">
                           ⚙️ إدارة المتجر (Admin)
                        </button>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setInterval(() => lucide.createIcons(), 1000);
    </script>
</body>
</html>
