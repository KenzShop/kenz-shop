<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenz Shop | Boutique Officielle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #B59449; --navy: #1B365D; --cream: #FDFBF7; }
        body { font-family: 'Plus Jakarta Sans', 'Amiri', serif; background-color: var(--cream); margin: 0; }
        .font-serif-title { font-family: 'Cinzel', serif; }
        .nav-blur { background: rgba(253, 251, 247, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-10px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module" babel>
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kenz-shop-default';

        const { useState, useEffect, useMemo } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [products, setProducts] = useState([]);
            const [view, setView] = useState('shop'); 
            const [isAuth, setIsAuth] = useState(false);
            const [pass, setPass] = useState("");
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [cart, setCart] = useState(0);
            const [filter, setFilter] = useState('الكل');

            const [form, setForm] = useState({ name: '', price: '', category: 'Home', desc: '', img: 'grande armoire.jpg' });

            useEffect(() => {
                const login = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                login();
                return onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'products');
                return onSnapshot(q, (s) => {
                    setProducts(s.docs.map(d => ({ id: d.id, ...d.data() })));
                }, (err) => console.error("Firestore Error:", err));
            }, [user]);

            const filteredProducts = useMemo(() => {
                if (filter === 'الكل') return products;
                return products.filter(p => p.category === filter);
            }, [products, filter]);

            const handleAdd = async (e) => {
                e.preventDefault();
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), {
                        ...form, price: parseFloat(form.price), createdAt: new Date().toISOString()
                    });
                    setForm({ name: '', price: '', category: 'Home', desc: '', img: 'grande armoire.jpg' });
                    alert("تمت إضافة المنتج بنجاح!");
                } catch (err) {
                    alert("حدث خطأ أثناء الإضافة");
                }
            };

            const handleDelete = async (id) => {
                if (confirm("هل أنت متأكد من حذف هذا المنتج؟")) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id));
                }
            };

            if (view === 'admin' && !isAuth) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#1B365D] p-6">
                        <div className="bg-white p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl text-center">
                            <h2 className="text-2xl font-bold mb-6 text-[#1B365D]">دخول الإدارة</h2>
                            <input type="password" placeholder="كلمة المرور (1234)" className="w-full p-4 border rounded-xl mb-4 text-center outline-none focus:border-[#B59449]" 
                                   value={pass} onChange={e => setPass(e.target.value)} />
                            <button onClick={() => pass === "1234" ? setIsAuth(true) : alert("كلمة مرور خاطئة")} className="w-full bg-[#1B365D] text-white py-4 rounded-xl font-bold hover:bg-[#B59449] transition-all">دخول</button>
                            <button onClick={() => setView('shop')} className="mt-4 text-gray-400 underline text-sm">إلغاء والعودة للمتجر</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="fixed top-0 w-full z-50 nav-blur border-b border-[#E8E1D5] h-20 px-8 flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            <img src="logo_final.svg" alt="Logo" className="h-12 w-auto" onerror="this.src='https://via.placeholder.com/40'"/>
                            <div className="hidden md:flex flex-col text-left" dir="ltr">
                                <span className="text-lg font-bold font-serif-title text-[#1B365D] leading-none">KENZ SHOP</span>
                                <span className="text-[7px] text-[#B59449] font-bold tracking-[0.2em] uppercase">Home • Mode • Cosmétique • Accessoires</span>
                            </div>
                        </div>
                        <div className="hidden lg:flex items-center gap-8 text-[11px] font-bold uppercase tracking-widest text-[#1B365D]">
                            {['الكل', 'Home', 'Mode', 'Cosmétique', 'Accessoires'].map(cat => (
                                <button key={cat} onClick={() => setFilter(cat)} className={`hover:text-[#B59449] transition ${filter === cat ? 'text-[#B59449] border-b-2 border-[#B59449]' : ''}`}>{cat}</button>
                            ))}
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="relative cursor-pointer hover:text-[#B59449] transition">
                                <i data-lucide="shopping-bag" className="w-6 h-6"></i>
                                <span className="absolute -top-2 -left-2 bg-[#B59449] text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">{cart}</span>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow pt-32 pb-20 px-6 max-w-7xl mx-auto w-full">
                        {view === 'admin' ? (
                            <div className="max-w-3xl mx-auto">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-bold text-[#1B365D]">إضافة منتج جديد</h2>
                                    <button onClick={() => {setView('shop'); setIsAuth(false); setPass("");}} className="text-[#B59449] font-bold underline flex items-center gap-2">
                                        <i data-lucide="arrow-right" className="w-4 h-4"></i> العودة للمتجر
                                    </button>
                                </div>
                                <form onSubmit={handleAdd} className="bg-white p-8 rounded-3xl border border-gray-100 space-y-4 mb-10 shadow-sm">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <input placeholder="اسم المنتج" required className="p-3 border rounded-xl outline-none focus:border-[#B59449]" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                                        <input type="number" placeholder="الثمن (DH)" required className="p-3 border rounded-xl outline-none focus:border-[#B59449]" value={form.price} onChange={e => setForm({...form, price: e.target.value})} />
                                        <select className="p-3 border rounded-xl outline-none focus:border-[#B59449]" value={form.category} onChange={e => setForm({...form, category: e.target.value})}>
                                            <option>Home</option><option>Mode</option><option>Cosmétique</option><option>Accessoires</option>
                                        </select>
                                        <input placeholder="اسم الصورة (مثال: grande armoire.jpg)" className="p-3 border rounded-xl outline-none focus:border-[#B59449]" value={form.img} onChange={e => setForm({...form, img: e.target.value})} />
                                    </div>
                                    <textarea placeholder="وصف تفصيلي للمنتج..." className="w-full p-3 border rounded-xl outline-none focus:border-[#B59449]" rows="4" value={form.desc} onChange={e => setForm({...form, desc: e.target.value})} />
                                    <button type="submit" className="w-full bg-[#1B365D] text-white py-4 rounded-xl font-bold hover:bg-[#B59449] transition-all flex items-center justify-center gap-2">
                                        <i data-lucide="plus-circle" className="w-5 h-5"></i> نشر المنتج في الموقع
                                    </button>
                                </form>
                                <div className="space-y-3">
                                    <h3 className="font-bold text-[#1B365D] mb-4">المنتجات الحالية ({products.length})</h3>
                                    {products.map(p => (
                                        <div key={p.id} className="bg-white p-4 border rounded-2xl flex justify-between items-center shadow-sm">
                                            <div className="flex items-center gap-4">
                                                <img src={p.img} className="w-12 h-12 object-cover rounded-lg bg-gray-50" onerror="this.src='https://via.placeholder.com/50'"/>
                                                <div>
                                                    <p className="font-bold text-sm text-[#1B365D]">{p.name}</p>
                                                    <p className="text-xs text-[#B59449] font-bold">{p.price} DH</p>
                                                </div>
                                            </div>
                                            <button onClick={() => handleDelete(p.id)} className="text-red-400 hover:text-red-600 p-2 transition-colors">
                                                <i data-lucide="trash-2" className="w-5 h-5"></i>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div>
                                <div className="text-center mb-16">
                                    <h1 className="font-serif-title text-4xl md:text-6xl mb-4 uppercase tracking-widest text-[#1B365D]">KENZ SHOP</h1>
                                    <div className="w-20 h-1 bg-[#B59449] mx-auto rounded-full"></div>
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                                    {filteredProducts.map(p => (
                                        <div key={p.id} onClick={() => setSelectedProduct(p)} className="product-card group bg-white rounded-[2.5rem] overflow-hidden shadow-sm hover:shadow-2xl border border-gray-50 cursor-pointer p-5">
                                            <div className="aspect-square rounded-[2rem] overflow-hidden mb-6 relative">
                                                <img src={p.img} alt={p.name} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" onerror="this.src='https://via.placeholder.com/400'"/>
                                                <div className="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors" />
                                            </div>
                                            <div className="text-center">
                                                <p className="text-[10px] text-gray-400 uppercase font-bold tracking-widest mb-1">{p.category}</p>
                                                <h3 className="font-bold text-[#1B365D] text-lg leading-tight mb-2">{p.name}</h3>
                                                <p className="text-[#B59449] font-black text-2xl">{p.price} DH</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                {filteredProducts.length === 0 && (
                                    <div className="text-center py-32">
                                        <i data-lucide="package-search" className="w-16 h-16 mx-auto text-gray-200 mb-4"></i>
                                        <p className="text-gray-400 italic">لا توجد منتجات في هذا القسم حالياً. تفضل بزيارة لوحة الإدارة لإضافتها.</p>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {selectedProduct && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-[#1B365D]/80 backdrop-blur-sm" onClick={() => setSelectedProduct(null)}></div>
                            <div className="relative bg-white w-full max-w-4xl rounded-[3rem] overflow-hidden shadow-2xl p-8 flex flex-col md:flex-row-reverse gap-10 max-h-[90vh]">
                                <div className="w-full md:w-1/2 rounded-[2rem] overflow-hidden">
                                    <img src={selectedProduct.img} className="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/600'"/>
                                </div>
                                <div className="w-full md:w-1/2 text-right flex flex-col justify-center">
                                    <span className="text-[#B59449] font-bold text-xs uppercase tracking-widest mb-2">{selectedProduct.category}</span>
                                    <h2 className="text-4xl font-bold mb-4 text-[#1B365D] leading-tight">{selectedProduct.name}</h2>
                                    <p className="text-3xl text-[#B59449] font-black mb-8">{selectedProduct.price} DH</p>
                                    <div className="text-gray-600 mb-10 overflow-y-auto max-h-40 leading-relaxed whitespace-pre-line pr-2">
                                        {selectedProduct.desc || "لا يوجد وصف متوفر حالياً لهذا المنتج المميز."}
                                    </div>
                                    <button onClick={() => { setCart(c => c+1); setSelectedProduct(null); }} className="bg-[#1B365D] text-white py-5 rounded-2xl font-bold text-lg hover:bg-[#B59449] transition-all shadow-xl flex items-center justify-center gap-3">
                                        <i data-lucide="shopping-cart" className="w-5 h-5"></i> إضافة إلى السلة
                                    </button>
                                </div>
                                <button onClick={() => setSelectedProduct(null)} className="absolute top-6 right-6 bg-white w-12 h-12 rounded-full flex items-center justify-center text-[#1B365D] shadow-xl hover:scale-110 transition-transform">
                                    <i data-lucide="x" class="w-6 h-6"></i>
                                </button>
                            </div>
                        </div>
                    )}

                    <footer className="py-24 text-center border-t border-gray-100 bg-white">
                        <div className="flex items-center justify-center gap-2 mb-6">
                            <img src="logo_final.svg" alt="Logo" className="h-8 opacity-50 grayscale" />
                        </div>
                        <p className="text-gray-300 text-[10px] tracking-[0.4em] mb-10 uppercase">KENZ SHOP OFFICIAL • QUALITY & AUTHENTICITY</p>
                        <button onClick={() => setView('admin')} className="bg-[#B59449] text-white px-10 py-4 rounded-full text-xs font-bold shadow-lg shadow-gold/20 hover:scale-105 active:scale-95 transition-all flex items-center gap-2 mx-auto">
                           <i data-lucide="settings" className="w-4 h-4"></i> إدارة المتجر (Admin)
                        </button>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        const refreshIcons = () => { if (window.lucide) window.lucide.createIcons(); };
        setInterval(refreshIcons, 1000);
    </script>
</body>
</html>
